<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Melodia Constellation Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-base: #141A30;
    --surface-raised: #1C2340;
    --gold: #C9A86A;
    --gold-soft: #DDC79B;
    --text-primary: #ECEAF4;
    --text-secondary: #A9A7C0;
    --border-gold: rgba(201, 168, 106, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface-base);
    color: var(--text-primary);
    overflow: hidden;
    width: 100%;
    height: 60px;
  }

  .nav-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: rgba(20, 26, 48, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: transform 0.3s ease;
  }

  .nav-container.hidden {
    transform: translateY(-100%);
  }

  .nav-inner {
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 0 40px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .nav-item:hover {
    transform: translateY(-2px);
  }

  .nav-star {
    width: 8px;
    height: 8px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    background: transparent;
    transition: all 0.3s ease;
    position: relative;
  }

  .nav-star::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .nav-item.active .nav-star {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  .nav-item.active .nav-star::before {
    opacity: 1;
  }

  .nav-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-secondary);
    transition: color 0.3s ease;
  }

  .nav-item:hover .nav-label,
  .nav-item.active .nav-label {
    color: var(--gold-soft);
  }

  /* Constellation Connecting Lines */
  .constellation-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .nav-item:hover ~ .constellation-line,
  .nav-item.active ~ .constellation-line {
    opacity: 0.6;
  }

  /* Active Indicator */
  .active-indicator {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--gold);
    transition: all 0.3s ease;
    box-shadow: 0 0 8px var(--gold);
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .nav-inner {
      gap: 24px;
      padding: 0 20px;
    }

    .nav-label {
      font-size: 10px;
      letter-spacing: 0.12em;
    }

    .nav-star {
      width: 6px;
      height: 6px;
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    .nav-item:hover {
      transform: none;
    }

    .nav-container,
    .nav-star,
    .nav-label,
    .active-indicator {
      transition: none;
    }
  }
</style>
</head>
<body>
<div class="nav-container" id="navContainer">
  <div class="nav-inner">
    <div class="nav-item active" data-section="renders">
      <div class="nav-star"></div>
      <span class="nav-label">Renders</span>
    </div>
    <div class="nav-item" data-section="illustrations">
      <div class="nav-star"></div>
      <span class="nav-label">Illustrations</span>
    </div>
    <div class="nav-item" data-section="breakdowns">
      <div class="nav-star"></div>
      <span class="nav-label">Breakdowns</span>
    </div>
    <div class="nav-item" data-section="about">
      <div class="nav-star"></div>
      <span class="nav-label">About</span>
    </div>
  </div>
  <div class="active-indicator" id="activeIndicator"></div>
</div>

<script>
  // Configuration from URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const config = {
    initialSection: urlParams.get('section') || 'renders',
    hideOnScroll: urlParams.get('hideOnScroll') === 'true'
  };

  // Navigation items
  const navItems = document.querySelectorAll('.nav-item');
  const activeIndicator = document.getElementById('activeIndicator');
  const navContainer = document.getElementById('navContainer');

  // Set initial active state
  function setActiveSection(section) {
    navItems.forEach(item => {
      if (item.dataset.section === section) {
        item.classList.add('active');
        updateIndicator(item);
      } else {
        item.classList.remove('active');
      }
    });
  }

  // Update active indicator position
  function updateIndicator(activeItem) {
    const rect = activeItem.getBoundingClientRect();
    const containerRect = navContainer.getBoundingClientRect();
    
    activeIndicator.style.width = `${rect.width}px`;
    activeIndicator.style.left = `${rect.left - containerRect.left}px`;
  }

  // Handle navigation clicks
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const section = item.dataset.section;
      setActiveSection(section);

      // Send message to parent about navigation
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'navigate', section }, '*');
      }
    });
  });

  // Handle scroll-based hiding
  let lastScrollY = 0;
  if (config.hideOnScroll) {
    window.addEventListener('scroll', () => {
      const currentScrollY = window.scrollY;
      
      if (currentScrollY > lastScrollY && currentScrollY > 100) {
        navContainer.classList.add('hidden');
      } else {
        navContainer.classList.remove('hidden');
      }
      
      lastScrollY = currentScrollY;
    });
  }

  // Listen for messages from parent
  window.addEventListener('message', (event) => {
    if (event.data.type === 'setSection') {
      setActiveSection(event.data.section);
    }
  });

  // Initialize
  setActiveSection(config.initialSection);

  // Handle window resize
  window.addEventListener('resize', () => {
    const activeItem = document.querySelector('.nav-item.active');
    if (activeItem) {
      updateIndicator(activeItem);
    }
  });
</script>
</body>
</html>
