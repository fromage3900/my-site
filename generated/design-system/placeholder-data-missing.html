<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  PLACEHOLDER/DATA MISSING — Missing render placeholder
  HOW TO USE: Wix Editor → Add (+) → Embed Code → Embed HTML → paste this file.
  Size: Set desired dimensions (e.g., 400 × 300px for image plate)
  Edit DATA below to customize.
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;height:100%}
  .placeholder{width:100%;height:100%;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#EFEAE1;border:1px dashed #E3DACE;border-radius:2px;font-family:'IBM Plex Mono',monospace}
  .icon{font-size:32px;margin-bottom:12px;opacity:0.3}
  .label{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#6E6080;margin-bottom:4px}
  .message{font-size:11px;color:#5A6170;text-align:center;max-width:80%}
</style>
</head>
<body>
<div id="placeholder"></div>
<script>
var DATA = {
  dataType: "Render",
  message: "No render data available"
};
var q=new URLSearchParams(location.search);
if(q.get("dataType")) DATA.dataType=q.get("dataType");
if(q.get("message")) DATA.message=q.get("message");
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function render(){
  var h=document.getElementById("placeholder");
  var html='<div class="placeholder"><div class="icon">&#10022;</div><div class="label">'+esc(DATA.dataType)+'</div><div class="message">'+esc(DATA.message)+'</div></div>';
  h.innerHTML=html;
}
render();
</script>
</body>
</html>
