<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA · Aurora Hero Banner — Animated Aurora Borealis Effect
  Features: Animated aurora particles, flowing gradients, mouse parallax, content-aware colors
  Usage: Same as other hero embeds, with additional aurora-specific config options
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Instrument+Serif:ital@0;1&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .hero{position:relative;width:100%;min-height:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:6vw 7vw;font-family:'Azeret Mono',monospace;background:#0a0e1a}
  .mark{position:absolute;top:5%;left:7vw;display:flex;align-items:center;gap:12px;z-index:10}
  .wordmark{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.32em;font-size:18px}
  .kick{letter-spacing:.28em;text-transform:uppercase;font-size:clamp(10px,1.1vw,13px)}
  .title{font-family:'Instrument Serif',serif;font-weight:500;line-height:.98;letter-spacing:-.01em;font-size:clamp(40px,7vw,92px);margin-top:1.2vh}
  .sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(16px,2vw,24px);margin-top:1.4vh}
  
  /* Aurora animations */
  @keyframes aurora-flow {
    0% { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
    100% { transform: translateX(-50%) translateY(-50%) rotate(360deg); }
  }
  
  @keyframes particle-float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }
  
  @keyframes star-twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  
  .aurora-container{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
  .aurora{position:absolute;width:200%;height:200%;top:-50%;left:-50%;opacity:0.6}
  .aurora-1{background:radial-gradient(ellipse at 30% 20%, rgba(110,90,166,0.4) 0%, transparent 50%);animation:aurora-flow 30s linear infinite}
  .aurora-2{background:radial-gradient(ellipse at 70% 80%, rgba(60,92,158,0.3) 0%, transparent 50%);animation:aurora-flow 40s linear infinite reverse}
  .aurora-3{background:radial-gradient(ellipse at 50% 50%, rgba(156,148,198,0.2) 0%, transparent 60%);animation:aurora-flow 35s linear infinite}
  
  .particle{position:absolute;width:2px;height:2px;background:rgba(201,168,106,0.8);border-radius:50%;animation:particle-float var(--duration, 8s) linear infinite}
  
  .star{position:absolute;background:#fff;border-radius:50%;animation:star-twinkle var(--twinkle-duration, 3s) ease-in-out infinite}
  
  .gstar{position:absolute;transition:transform 0.3s ease-out}
  .gstar svg{filter:drop-shadow(0 0 8px rgba(201,168,106,.8))}
  
  svg.constel{position:absolute;right:5vw;top:12%;width:min(42vw,520px);height:auto;opacity:.7;transition:transform 0.3s ease-out}
  .burst{filter:drop-shadow(0 0 10px rgba(201,168,106,.7))}
  
  .parallax-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .parallax-layer.aurora{z-index:0}
  .parallax-layer.particles{z-index:1}
  .parallax-layer.stars{z-index:2}
  .parallax-layer.constellation{z-index:3}
</style>
</head>
<body>
<div class="hero" id="hero">
  <div class="parallax-layer aurora" id="aurora-layer"></div>
  <div class="parallax-layer particles" id="particles-layer"></div>
  <div class="parallax-layer stars" id="stars-layer"></div>
  <div class="parallax-layer constellation" id="constel-layer"></div>
  <div class="mark" id="mark"></div>
  <div class="kick" id="kick"></div>
  <div class="title" id="title"></div>
  <div class="sub" id="sub"></div>
</div>
<script>
/* ============ AURORA CONFIGURATION ============ */
var CONFIG = {
  kicker: "3D Environment & Technical Art",
  title: "Northern Expanse",
  sub: "where light dances across the sky",
  
  // Aurora settings
  auroraIntensity: 0.6,         // 0.0 to 1.0
  auroraSpeed: 1.0,            // Speed multiplier
  
  // Particle settings
  particleCount: 50,           // Number of floating particles
  particleSpeed: { min: 6, max: 12 }, // Duration in seconds
  
  // Star settings
  starCount: 60,
  gstarCount: 6,
  
  // Parallax
  parallaxEnabled: true,
  parallaxStrength: 0.04
};
/* =============================================== */

// URL overrides
var q=new URLSearchParams(location.search);
["kicker","title","sub"].forEach(function(k){ if(q.get(k)) CONFIG[k]=q.get(k); });
Object.keys(CONFIG).forEach(function(k){ 
  if(typeof CONFIG[k] === 'number' && q.get(k)) CONFIG[k]=parseFloat(q.get(k)); 
});
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function burst(size,color){
  var pts=[],cx=size/2,cy=size/2,o=size/2,inr=o*0.4;
  for(var i=0;i<16;i++){
    var r=i%2===0?o:inr;
    var a=-Math.PI/2+i*Math.PI/8;
    pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));
  }
  return '<svg class="burst" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/></svg>';
}

function fourstar(s,c){
  var h=s/2,t=s*0.16;
  var d="M "+h+" 0 L "+(h+t)+" "+(h-t)+" L "+s+" "+h+" L "+(h+t)+" "+(h+t)+" L "+h+" "+s+" L "+(h-t)+" "+(h+t)+" L 0 "+h+" L "+(h-t)+" "+(h-t)+" Z";
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'"><path d="'+d+'" fill="'+c+'"/></svg>';
}

function rng(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}

function randomRange(min, max) {
  return Math.random() * (max - min) + min;
}

function createAurora() {
  var html='<div class="aurora-container">';
  html+='<div class="aurora aurora-1" style="opacity:'+CONFIG.auroraIntensity+';animation-duration:'+(30/CONFIG.auroraSpeed)+'s"></div>';
  html+='<div class="aurora aurora-2" style="opacity:'+(CONFIG.auroraIntensity*0.8)+';animation-duration:'+(40/CONFIG.auroraSpeed)+'s"></div>';
  html+='<div class="aurora aurora-3" style="opacity:'+(CONFIG.auroraIntensity*0.6)+';animation-duration:'+(35/CONFIG.auroraSpeed)+'s"></div>';
  html+='</div>';
  return html;
}

function createParticles(container, count) {
  var r=rng(123);
  var html='';
  for(var i=0;i<count;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    var duration=randomRange(CONFIG.particleSpeed.min, CONFIG.particleSpeed.max).toFixed(1);
    var delay=(r()*5).toFixed(1);
    var size=(1+r()*2).toFixed(1);
    html+='<div class="particle" style="left:'+x+'%;top:'+y+'%;width:'+size+'px;height:'+size+'px;--duration:'+duration+'s;animation-delay:'+delay+'s"></div>';
  }
  container.innerHTML=html;
}

function createStars(container, count, isGold) {
  var r=rng(42);
  var html='';
  var gold="#C9A86A";
  
  for(var i=0;i<count;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    var parallaxDepth=(r()*2-1).toFixed(2);
    
    if(isGold){
      html+='<div class="gstar parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.7">'+fourstar(10,gold)+'</div>';
    } else {
      var sz=(0.8+r()*1.8).toFixed(1);
      var opacity=(0.2+r()*0.5).toFixed(2);
      var twinkleDuration=randomRange(2,5).toFixed(1);
      html+='<div class="star parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+opacity+';--twinkle-duration:'+twinkleDuration+'s"></div>';
    }
  }
  container.innerHTML=html;
}

function setupParallax() {
  if(!CONFIG.parallaxEnabled) return;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  
  var hero=document.getElementById('hero');
  var stars=document.querySelectorAll('.parallax-star');
  var constel=document.querySelector('.constel');
  
  hero.addEventListener('mousemove', function(e){
    var rect=hero.getBoundingClientRect();
    var mouseX=(e.clientX-rect.left)/rect.width-0.5;
    var mouseY=(e.clientY-rect.top)/rect.height-0.5;
    
    stars.forEach(function(star){
      var depth=parseFloat(star.getAttribute('data-depth')||0);
      var moveX=mouseX*depth*CONFIG.parallaxStrength*100;
      var moveY=mouseY*depth*CONFIG.parallaxStrength*100;
      star.style.transform='translate('+moveX+'px,'+moveY+'px)';
    });
    
    if(constel){
      var moveX=mouseX*CONFIG.parallaxStrength*60;
      var moveY=mouseY*CONFIG.parallaxStrength*60;
      constel.style.transform='translate('+moveX+'px,'+moveY+'px)';
    }
  });
  
  hero.addEventListener('mouseleave', function(){
    stars.forEach(function(star){
      star.style.transform='translate(0,0)';
    });
    if(constel){
      constel.style.transform='translate(0,0)';
    }
  });
}

function render(){
  var h=document.getElementById("hero");
  var gold="#C9A86A";
  
  // Render aurora
  document.getElementById('aurora-layer').innerHTML=createAurora();
  
  // Render particles
  createParticles(document.getElementById('particles-layer'), CONFIG.particleCount);
  
  // Render stars
  createStars(document.getElementById('stars-layer'), CONFIG.starCount, false);
  var r2=rng(11);
  for(var j=0;j<CONFIG.gstarCount;j++){
    var x=(55+r2()*40).toFixed(1);
    var y=(10+r2()*70).toFixed(1);
    var parallaxDepth=(r2()*2-1).toFixed(2);
    document.getElementById('stars-layer').innerHTML+='<div class="gstar parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.7">'+fourstar(10,gold)+'</div>';
  }
  
  // Render constellation
  document.getElementById('constel-layer').innerHTML='<svg class="constel" viewBox="0 0 520 330"><g stroke="#8AA9D6" stroke-width="1" fill="none" opacity=".6"><path d="M30 90 L160 200 L300 110 L450 240 M300 110 L350 40 L230 300"/></g><g fill="#C9A86A"><circle cx="30" cy="90" r="4"/><circle cx="160" cy="200" r="5"/><circle cx="300" cy="110" r="4"/><circle cx="450" cy="240" r="5"/><circle cx="350" cy="40" r="4"/><circle cx="230" cy="300" r="4"/></g></svg>';
  
  // Render text
  document.getElementById('mark').innerHTML=burst(24,gold)+'<span class="wordmark" style="color:#ECEAF4">MELODIA</span>';
  document.getElementById('kick').innerHTML=esc(CONFIG.kicker);
  document.getElementById('kick').style.color="#DDC79B";
  document.getElementById('title').innerHTML=esc(CONFIG.title);
  document.getElementById('title').style.color="#ECEAF4";
  document.getElementById('sub').innerHTML=esc(CONFIG.sub);
  document.getElementById('sub').style.color="#8AA9D6";
  
  setupParallax();
}

render();
</script>
</body>
</html>
