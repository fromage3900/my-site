<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA · Animated Asset Passport — Wix HTML embed
  HOW TO USE IN WIX:
   1. Editor → Add (+) → Embed Code → Embed HTML → "Enter Code".
   2. Paste this ENTIRE file.
   3. Drag the box to ~ 360 × 560 px (dark) — it auto-fits; adjust height if needed.
   4. Edit the CONFIG block below, OR pass values via the iframe URL query string.
  FEATURES: Animated accent elements, content-aware styling, hover effects, easy configuration
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{display:flex;justify-content:center;padding:8px}
  .passport{width:100%;max-width:360px;border-radius:3px;padding:24px 26px;font-family:'IBM Plex Mono',monospace;position:relative;overflow:hidden}
  
  /* Animations */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(201,168,106,0.3); }
    50% { box-shadow: 0 0 30px rgba(201,168,106,0.5); }
  }
  
  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  .passport{animation:fadeInUp 0.6s ease-out}
  .passport:hover{animation:pulse-glow 3s ease-in-out infinite}
  
  .head{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .kick{letter-spacing:.24em;font-size:10px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .ver{font-size:11px}
  .rule{height:1px;margin:13px 0;position:relative;z-index:2}
  .title{font-family:'Fraunces',serif;font-weight:500;font-size:28px;line-height:1.05;position:relative;z-index:2}
  .cat{letter-spacing:.22em;font-size:11px;text-transform:uppercase;margin-top:4px;position:relative;z-index:2}
  .row{display:flex;justify-content:space-between;padding:8px 0;font-size:12.5px;position:relative;z-index:2;transition:background 0.3s ease}
  .row:hover{background:rgba(255,255,255,0.05)}
  .k{letter-spacing:.12em;text-transform:uppercase}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;letter-spacing:.1em;position:relative;z-index:2}
  .burst{filter:drop-shadow(0 0 6px rgba(201,168,106,.6))}
  
  /* Decorative background elements */
  .bg-decoration{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0.03}
  .bg-star{position:absolute;transition:transform 3s ease-in-out}
  .bg-star:hover{transform:scale(1.5) rotate(45deg)}
  
  /* Content-aware styling */
  .passport.highlight-environment .title{color:#8AA9D6}
  .passport.highlight-character .title{color:#9F94C6}
  .passport.highlight-prop .title{color:#D6A9B0}
  .passport.highlight-abstract .title{color:#C9A86A}
  
  /* Shimmer effect on hover */
  .shimmer-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);background-size:200% 100%;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
  .passport:hover .shimmer-overlay{opacity:1;animation:shimmer 2s infinite}
</style>
</head>
<body>
<div id="pp"></div>
<script>
/* ============ CONFIGURATION — Easy customization ============ */
var CONFIG = {
  theme: "dark",                 // "dark" (Astral Night) or "light" (Ivory)
  highlight: "environment",     // "environment" | "character" | "prop" | "abstract" (affects title color)
  project: "Ashen Cathedral",
  category: "Environment",
  version: "v1.2",
  
  // Enable/disable features
  animations: true,             // Enable animations
  hoverEffects: true,           // Enable hover effects
  decorativeStars: true,         // Show decorative background stars
  
  rows: [
    ["Triangles", "482,318"],
    ["Textures", "4K"],
    ["Materials", "12"],
    ["Software", "Blender · ZBrush"],
    ["Engine", "Unreal Engine 5.4"],
    ["Date", "2026-03"]
  ]
};
/* ====================================================================== */

// URL overrides
var q = new URLSearchParams(location.search);
["theme","project","category","version","highlight"].forEach(function(k){ 
  if(q.get(k)) CONFIG[k]=q.get(k); 
  if(k==="animations"||k==="hoverEffects"||k==="decorativeStars") CONFIG[k]=q.get(k)==='true';
});
var rowKeys = ["triangles","textures","materials","software","engine","date","drawcalls","lod"];
rowKeys.forEach(function(k){
  var v=q.get(k); if(v==null) return;
  var label=k.charAt(0).toUpperCase()+k.slice(1).replace("drawcalls","Draw Calls").replace("lod","LOD");
  var found=CONFIG.rows.find(function(r){return r[0].toLowerCase()===k;});
  if(found){found[1]=v;} else {CONFIG.rows.push([label,v]);}
});
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function burst(size,color){
  var pts=[],cx=size/2,cy=size/2,outer=size/2,inner=outer*0.4;
  for(var i=0;i<16;i++){var r=i%2===0?outer:inner;var a=-Math.PI/2+i*Math.PI/8;pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));}
  return '<svg class="burst" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/></svg>';
}

function fourstar(s,c){
  var h=s/2,t=s*0.16;
  var d="M "+h+" 0 L "+(h+t)+" "+(h-t)+" L "+s+" "+h+" L "+(h+t)+" "+(h+t)+" L "+h+" "+s+" L "+(h-t)+" "+(h+t)+" L 0 "+h+" L "+(h-t)+" "+(h-t)+" Z";
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'"><path d="'+d+'" fill="'+c+'"/></svg>';
}

function createDecorativeStars(color){
  var html='<div class="bg-decoration">';
  for(var i=0;i<5;i++){
    var x=Math.random()*80+10;
    var y=Math.random()*80+10;
    var size=Math.random()*8+4;
    var rotation=Math.random()*360;
    html+='<div class="bg-star" style="left:'+x+'%;top:'+y+'%;transform:rotate('+rotation+'deg)">'+fourstar(size,color)+'</div>';
  }
  html+='</div>';
  return html;
}

function render(){
  var dark = CONFIG.theme!=="light";
  var c = dark
    ? {surf:"#1C2340",bord:"rgba(201,168,106,.35)",txt:"#ECEAF4",sec:"#A9A7C0",acc:"#DDC79B",gold:"#C9A86A",glow:"0 0 40px rgba(60,92,158,.35)",line:"rgba(255,255,255,.06)"}
    : {surf:"#FFFFFF",bord:"rgba(176,141,79,.4)",txt:"#241B2E",sec:"#6E6080",acc:"#A7884E",gold:"#B08D4F",glow:"0 18px 40px rgba(36,27,46,.12)",line:"rgba(0,0,0,.06)"};
  
  var rows = CONFIG.rows.map(function(r){
    return '<div class="row" style="border-top:1px solid '+c.line+'"><span class="k" style="color:'+c.sec+'">'+esc(r[0])+'</span><span style="color:'+c.txt+'">'+esc(r[1])+'</span></div>';
  }).join("");
  
  var decorativeStars = CONFIG.decorativeStars ? createDecorativeStars(c.gold) : '';
  var shimmerEffect = CONFIG.hoverEffects ? '<div class="shimmer-overlay"></div>' : '';
  var animationClass = CONFIG.animations ? '' : 'style="animation:none"';
  var hoverClass = CONFIG.hoverEffects ? '' : 'style="animation:none"';
  
  var passportStyle='background:'+c.surf+';border:1px solid '+c.bord+';box-shadow:'+c.glow;
  if(!CONFIG.animations || window.matchMedia('(prefers-reduced-motion: reduce)').matches) passportStyle+=';animation:none';
  
  document.getElementById("pp").innerHTML =
    '<div class="passport highlight-'+esc(CONFIG.highlight||'environment')+'" style="'+passportStyle+'">'
    +decorativeStars
    +shimmerEffect
    +'<div class="head"><span class="kick" style="color:'+c.acc+'">'+burst(14,c.gold)+'Asset Passport</span><span class="ver" style="color:'+c.sec+'">'+esc(CONFIG.version)+'</span></div>'
    +'<div class="rule" style="background:'+c.gold+'"></div>'
    +'<div class="title" style="color:'+c.txt+'">'+esc(CONFIG.project)+'</div><div class="cat" style="color:'+c.sec+'">'+esc(CONFIG.category)+'</div>'
    +'<div style="height:8px"></div>'+rows
    +'<div class="rule" style="background:'+c.gold+';margin-top:13px"></div>'
    +'<div class="foot"><span style="display:flex;align-items:center;gap:7px">'+burst(10,c.gold)+'</span><span style="color:'+c.sec+'">MELODIA</span></div>'
    +'</div>';
  
  // Add hover effect for decorative stars
  if(CONFIG.decorativeStars){
    document.querySelectorAll('.bg-star').forEach(function(star, index){
      star.style.animationDelay = (index * 0.5) + 's';
    });
  }
}
render();
</script>
</body>
</html>
