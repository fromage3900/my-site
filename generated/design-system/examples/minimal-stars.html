<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA — Minimal Stars Example
  Basic usage of the star system component
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/melodia-animations.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .container{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0e1a}
  .content{position:relative;z-index:10;text-align:center;color:#ECEAF4;font-family:'Fraunces',serif}
  .stars-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
  h1{font-size:48px;margin-bottom:16px}
  p{font-family:'IBM Plex Mono',monospace;font-size:14px;opacity:0.7}
</style>
</head>
<body>
<div class="container">
  <div class="stars-container" id="stars"></div>
  <div class="content">
    <h1>Minimal Stars</h1>
    <p>Basic star system with default configuration</p>
  </div>
</div>

<!-- Load utilities and components -->
<script src="../components/melodia-utils.js"></script>
<script src="../components/melodia-star-system.js"></script>

<script>
// Initialize star system with default config
const starSystem = new MelodiaStarSystem('#stars', {
  starCount: 50,
  gstarCount: 5,
  enableParallax: true
});

starSystem.init();
</script>
</body>
</html>
