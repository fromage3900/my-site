<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA — Combined Effects Example
  Multiple components working together
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument Serif:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/melodia-animations.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .container{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0e1a}
  .content{position:relative;z-index:10;text-align:center;color:#ECEAF4;font-family:'Instrument Serif',serif;padding:20px}
  .effects-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .aurora-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
  .stars-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
  h1{font-size:64px;margin-bottom:16px;text-shadow:0 0 30px rgba(201,168,106,0.6)}
  p{font-family:'Azeret Mono',monospace;font-size:16px;opacity:0.9;margin-bottom:24px}
  .controls{display:flex;gap:12px;justify-content:center;margin-top:20px}
  button{padding:10px 20px;background:rgba(201,168,106,0.2);border:1px solid rgba(201,168,106,0.5);color:#ECEAF4;font-family:'Azeret Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.3s ease}
  button:hover{background:rgba(201,168,106,0.4);border-color:rgba(201,168,106,0.8)}
</style>
</head>
<body>
<div class="container">
  <div class="effects-container">
    <div class="aurora-layer" id="aurora"></div>
    <div class="stars-layer" id="stars"></div>
  </div>
  <div class="content">
    <h1>Combined Effects</h1>
    <p>Aurora + Stars + Parallax working together</p>
    <div class="controls">
      <button onclick="toggleAurora()">Toggle Aurora</button>
      <button onclick="changeTheme()">Change Theme</button>
      <button onclick="adjustIntensity()">Adjust Intensity</button>
    </div>
  </div>
</div>

<!-- Load utilities and components -->
<script src="../components/melodia-utils.js"></script>
<script src="../components/melodia-star-system.js"></script>
<script src="../components/melodia-aurora.js"></script>
<script src="../components/melodia-parallax.js"></script>

<script>
// Initialize components
let aurora, starSystem, parallax;
let auroraEnabled = true;
let currentTheme = 0;

const themes = [
  {
    auroraColors: [
      'rgba(110,90,166,0.5)',
      'rgba(60,92,158,0.4)',
      'rgba(156,148,198,0.4)'
    ],
    gstarColor: '#C9A86A'
  },
  {
    auroraColors: [
      'rgba(214,169,176,0.5)',
      'rgba(156,148,198,0.4)',
      'rgba(201,168,106,0.4)'
    ],
    gstarColor: '#D6A9B0'
  },
  {
    auroraColors: [
      'rgba(60,92,158,0.5)',
      'rgba(138,169,214,0.4)',
      'rgba(110,90,166,0.4)'
    ],
    gstarColor: '#8AA9D6'
  }
];

function init() {
  // Initialize aurora
  aurora = new MelodiaAurora('#aurora', {
    auroraCount: 3,
    auroraIntensity: 0.7,
    auroraSpeed: 1.0,
    particleCount: 50
  });
  aurora.init();
  
  // Initialize stars
  starSystem = new MelodiaStarSystem('#stars', {
    starCount: 60,
    gstarCount: 6,
    enableParallax: false // We'll use separate parallax system
  });
  starSystem.init();
  
  // Initialize parallax for the content
  parallax = new MelodiaParallax('.container', {
    strength: 0.04,
    enableMouse: true,
    enableTouch: true
  });
  parallax.addElements('.melodia-star', { min: 0.5, max: 1.5 });
  parallax.addElements('.melodia-gstar', { min: 0.8, max: 1.2 });
  parallax.addElement('.content', 0.3);
  parallax.init();
}

function toggleAurora() {
  auroraEnabled = !auroraEnabled;
  if (auroraEnabled) {
    aurora.resume();
  } else {
    aurora.pause();
  }
}

function changeTheme() {
  currentTheme = (currentTheme + 1) % themes.length;
  const theme = themes[currentTheme];
  
  aurora.setAuroraColors(theme.auroraColors);
  starSystem.setColors('#ffffff', theme.gstarColor);
}

function adjustIntensity() {
  const newIntensity = Math.random();
  aurora.setAuroraIntensity(newIntensity);
}

// Initialize on load
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
