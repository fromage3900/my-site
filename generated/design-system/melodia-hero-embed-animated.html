<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA · Animated Hero Banner with Parallax — Wix HTML embed
  HOW TO USE: Wix Editor → Add (+) → Embed Code → Embed HTML → paste this file.
  Stretch the box full-width; set height ~ 420–520px. It is fluid/responsive.
  Edit CONFIG below or override via URL query: ?title=...&kicker=...&sub=...&theme=dark|nebula|ivory
  FEATURES: Animated stars, mouse parallax, content-aware backgrounds, easy configuration
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Instrument+Serif:ital@0;1&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .hero{position:relative;width:100%;min-height:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:6vw 7vw;font-family:'Azeret Mono',monospace}
  .mark{position:absolute;top:5%;left:7vw;display:flex;align-items:center;gap:12px;z-index:10}
  .wordmark{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.32em;font-size:18px}
  .kick{letter-spacing:.28em;text-transform:uppercase;font-size:clamp(10px,1.1vw,13px)}
  .title{font-family:'Instrument Serif',serif;font-weight:500;line-height:.98;letter-spacing:-.01em;font-size:clamp(40px,7vw,92px);margin-top:1.2vh}
  .sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(16px,2vw,24px);margin-top:1.4vh}
  
  /* Star animations */
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  
  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  .star{position:absolute;background:#fff;border-radius:50%;transition:transform 0.3s ease-out}
  .star.twinkle{animation:twinkle var(--twinkle-duration, 3s) ease-in-out infinite}
  .star.float{animation:float var(--float-duration, 4s) ease-in-out infinite}
  .star.pulse{animation:pulse var(--pulse-duration, 2s) ease-in-out infinite}
  
  .gstar{position:absolute;transition:transform 0.3s ease-out}
  .gstar svg{filter:drop-shadow(0 0 6px rgba(201,168,106,.7))}
  .gstar.rotate{animation:rotate var(--rotate-duration, 20s) linear infinite}
  
  /* Parallax layers */
  .parallax-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .parallax-layer.stars{z-index:1}
  .parallax-layer.constellation{z-index:2}
  .parallax-layer.nebula{z-index:0}
  
  svg.constel{position:absolute;right:5vw;top:12%;width:min(42vw,520px);height:auto;opacity:.9;transition:transform 0.3s ease-out}
  .burst{filter:drop-shadow(0 0 8px rgba(201,168,106,.65))}
  
  /* Content-aware background variations */
  .hero.theme-environment{background:radial-gradient(120% 120% at 20% 0%, #1b2444 0%, #141A30 60%, #0f1426 100%)}
  .hero.theme-character{background:radial-gradient(120% 120% at 80% 0%, #2a1f3a 0%, #1C1426 60%, #0f1426 100%)}
  .hero.theme-prop{background:radial-gradient(120% 120% at 50% 0%, #1a2a3a 0%, #141A30 60%, #0f1426 100%)}
  .hero.theme-abstract{background:radial-gradient(120% 120% at 30% 50%, #2a1a2a 0%, #1C1426 60%, #0f1426 100%)}
</style>
</head>
<body>
<div class="hero" id="hero">
  <div class="parallax-layer nebula" id="nebula-layer"></div>
  <div class="parallax-layer stars" id="stars-layer"></div>
  <div class="parallax-layer constellation" id="constel-layer"></div>
  <div class="mark" id="mark"></div>
  <div class="kick" id="kick"></div>
  <div class="title" id="title"></div>
  <div class="sub" id="sub"></div>
</div>
<script>
/* ============ CONFIGURATION — Easy customization ============ */
var CONFIG = {
  theme: "dark",                 // "dark" | "nebula" | "ivory"
  contentTheme: "environment",   // "environment" | "character" | "prop" | "abstract" (affects background)
  kicker: "3D Environment & Technical Art",
  title: "Ashen Cathedral",
  sub: "mapped to the stars",
  
  // Star animation settings
  starCount: 70,                 // Number of background stars
  gstarCount: 8,                // Number of gold stars
  twinkleChance: 0.3,           // 30% of stars will twinkle
  floatChance: 0.2,             // 20% of stars will float
  pulseChance: 0.15,             // 15% of stars will pulse
  
  // Parallax settings
  parallaxEnabled: true,         // Enable mouse parallax
  parallaxStrength: 0.03,       // How much elements move (0.01 = subtle, 0.1 = strong)
  
  // Animation speeds (in seconds)
  twinkleDuration: { min: 2, max: 5 },
  floatDuration: { min: 3, max: 6 },
  pulseDuration: { min: 1.5, max: 3 },
  rotateDuration: { min: 15, max: 30 }
};
/* ====================================================================== */

// URL overrides
var q=new URLSearchParams(location.search);
Object.keys(CONFIG).forEach(function(k){ 
  if(q.get(k)) CONFIG[k]=q.get(k); 
  // Convert numeric strings back to numbers
  if(typeof CONFIG[k] === 'number' && !isNaN(q.get(k))) CONFIG[k]=parseFloat(q.get(k));
  if(typeof CONFIG[k] === 'boolean') CONFIG[k]=q.get(k) === 'true';
});
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function burst(size,color){
  var pts=[],cx=size/2,cy=size/2,o=size/2,inr=o*0.4;
  for(var i=0;i<16;i++){
    var r=i%2===0?o:inr;
    var a=-Math.PI/2+i*Math.PI/8;
    pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));
  }
  return '<svg class="burst" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/></svg>';
}

function fourstar(s,c){
  var h=s/2,t=s*0.16;
  var d="M "+h+" 0 L "+(h+t)+" "+(h-t)+" L "+s+" "+h+" L "+(h+t)+" "+(h+t)+" L "+h+" "+s+" L "+(h-t)+" "+(h+t)+" L 0 "+h+" L "+(h-t)+" "+(h-t)+" Z";
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'"><path d="'+d+'" fill="'+c+'"/></svg>';
}

function rng(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}

function randomRange(min, max) {
  return Math.random() * (max - min) + min;
}

function createAnimatedStars(container, count, isGold) {
  var r=rng(42);
  var html='';
  var goldMark = CONFIG.theme==="ivory" ? "#A7884E" : "#C9A86A";
  
  for(var i=0;i<count;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    var parallaxDepth = (r()*2-1).toFixed(2); // -1 to 1 for parallax depth
    
    if(isGold){
      var rotateDuration = randomRange(CONFIG.rotateDuration.min, CONFIG.rotateDuration.max).toFixed(1);
      var shouldRotate = Math.random() > 0.5;
      html+='<div class="gstar parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.85;'+(shouldRotate?'--rotate-duration:'+rotateDuration+'s':'')+'">'+fourstar(9,goldMark)+'</div>';
    } else {
      var sz=(0.8+r()*1.6).toFixed(1);
      var opacity=(0.25+r()*0.4).toFixed(2);
      var animClass='';
      var animDuration='';
      
      // Randomly assign animations
      if(Math.random() < CONFIG.twinkleChance){
        animClass='twinkle';
        animDuration='--twinkle-duration:'+randomRange(CONFIG.twinkleDuration.min, CONFIG.twinkleDuration.max).toFixed(1)+'s';
      } else if(Math.random() < CONFIG.floatChance){
        animClass='float';
        animDuration='--float-duration:'+randomRange(CONFIG.floatDuration.min, CONFIG.floatDuration.max).toFixed(1)+'s';
      } else if(Math.random() < CONFIG.pulseChance){
        animClass='pulse';
        animDuration='--pulse-duration:'+randomRange(CONFIG.pulseDuration.min, CONFIG.pulseDuration.max).toFixed(1)+'s';
      }
      
      html+='<div class="star parallax-star '+animClass+'" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+opacity+';'+animDuration+'"></div>';
    }
  }
  container.innerHTML=html;
}

function setupParallax() {
  if(!CONFIG.parallaxEnabled) return;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  
  var hero=document.getElementById('hero');
  var stars=document.querySelectorAll('.parallax-star');
  var constel=document.querySelector('.constel');
  
  hero.addEventListener('mousemove', function(e){
    var rect=hero.getBoundingClientRect();
    var mouseX=(e.clientX-rect.left)/rect.width-0.5; // -0.5 to 0.5
    var mouseY=(e.clientY-rect.top)/rect.height-0.5;
    
    stars.forEach(function(star){
      var depth=parseFloat(star.getAttribute('data-depth')||0);
      var moveX=mouseX*depth*CONFIG.parallaxStrength*100;
      var moveY=mouseY*depth*CONFIG.parallaxStrength*100;
      star.style.transform='translate('+moveX+'px,'+moveY+'px)';
    });
    
    if(constel){
      var moveX=mouseX*CONFIG.parallaxStrength*50;
      var moveY=mouseY*CONFIG.parallaxStrength*50;
      constel.style.transform='translate('+moveX+'px,'+moveY+'px)';
    }
  });
  
  hero.addEventListener('mouseleave', function(){
    stars.forEach(function(star){
      star.style.transform='translate(0,0)';
    });
    if(constel){
      constel.style.transform='translate(0,0)';
    }
  });
}

var T = {
  dark:  {bg:"radial-gradient(120% 120% at 20% 0%, #1b2444 0%, #141A30 60%, #0f1426 100%)", word:"#ECEAF4", kick:"#DDC79B", title:"#ECEAF4", sub:"#DDC79B", stars:true, constel:true, nebula:false},
  nebula:{bg:"#141A30", word:"#ECEAF4", kick:"#A99AD0", title:"#ECEAF4", sub:"#A99AD0", stars:true, constel:false, nebula:true},
  ivory: {bg:"linear-gradient(180deg,#FCFBF8,#F7F4EF)", word:"#241B2E", kick:"#5A6170", title:"#241B2E", sub:"#A7884E", stars:false, constel:false, nebula:false}
};

function render(){
  var t = T[CONFIG.theme]||T.dark;
  var h=document.getElementById("hero");
  var goldMark = CONFIG.theme==="ivory" ? "#A7884E" : "#C9A86A";
  
  // Apply content-aware theme if not nebula/ivory
  if(CONFIG.theme==="dark" && CONFIG.contentTheme!=="environment"){
    h.className="hero theme-"+CONFIG.contentTheme;
  } else {
    h.style.background=t.bg;
  }
  
  // Render nebula
  var nebulaLayer=document.getElementById('nebula-layer');
  if(t.nebula){
    nebulaLayer.innerHTML='<div style="position:absolute;right:-8%;top:-30%;width:60%;height:120%;border-radius:50%;background:radial-gradient(closest-side,rgba(110,90,166,.7),rgba(110,90,166,0));filter:blur(40px)"></div>'+
    '<div style="position:absolute;left:-12%;bottom:-30%;width:55%;height:110%;border-radius:50%;background:radial-gradient(closest-side,rgba(60,92,158,.55),rgba(60,92,158,0));filter:blur(46px)"></div>';
  } else {
    nebulaLayer.innerHTML='';
  }
  
  // Render animated stars
  var starsLayer=document.getElementById('stars-layer');
  if(t.stars){
    createAnimatedStars(starsLayer, CONFIG.starCount, false);
    // Add gold stars
    for(var j=0;j<CONFIG.gstarCount;j++){
      var r2=rng(11);
      var x=(55+r2()*40).toFixed(1);
      var y=(10+r2()*70).toFixed(1);
      var parallaxDepth=(r2()*2-1).toFixed(2);
      var rotateDuration=randomRange(CONFIG.rotateDuration.min, CONFIG.rotateDuration.max).toFixed(1);
      starsLayer.innerHTML+='<div class="gstar parallax-star rotate" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.5;--rotate-duration:'+rotateDuration+'s">'+fourstar(9,goldMark)+'</div>';
    }
  } else {
    // Minimal stars for ivory theme
    var r2=rng(11);
    var minimalStars='';
    for(var j=0;j<6;j++){
      minimalStars+='<div class="gstar" style="left:'+(55+r2()*40).toFixed(1)+'%;top:'+(10+r2()*70).toFixed(1)+'%;opacity:.5">'+fourstar(9,"#A7884E")+'</div>';
    }
    starsLayer.innerHTML=minimalStars;
  }
  
  // Render constellation
  var constelLayer=document.getElementById('constel-layer');
  if(t.constel){
    constelLayer.innerHTML='<svg class="constel" viewBox="0 0 520 330"><g stroke="#DDC79B" stroke-width="1" fill="none" opacity=".55"><path d="M30 90 L160 200 L300 110 L450 240 M300 110 L350 40 L230 300"/></g><g fill="#C9A86A"><circle cx="30" cy="90" r="4"/><circle cx="160" cy="200" r="5"/><circle cx="300" cy="110" r="4"/><circle cx="450" cy="240" r="5"/><circle cx="350" cy="40" r="4"/><circle cx="230" cy="300" r="4"/></g></svg>';
  } else {
    constelLayer.innerHTML='';
  }
  
  // Render text content
  document.getElementById('mark').innerHTML=burst(22,goldMark)+'<span class="wordmark" style="color:'+t.word+'">MELODIA</span>';
  document.getElementById('kick').innerHTML=esc(CONFIG.kicker);
  document.getElementById('kick').style.color=t.kick;
  document.getElementById('title').innerHTML=esc(CONFIG.title);
  document.getElementById('title').style.color=t.title;
  document.getElementById('sub').innerHTML=esc(CONFIG.sub);
  document.getElementById('sub').style.color=t.sub;
  
  // Setup parallax
  setupParallax();
}

render();
</script>
</body>
</html>
