<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA · Cosmic Hero Banner — Deep Space Effect
  Features: Rotating galaxy, nebula clouds, shooting stars, cosmic dust, mouse parallax
  Usage: Same as other hero embeds, with cosmic-specific config options
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Instrument+Serif:ital@0;1&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .hero{position:relative;width:100%;min-height:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:6vw 7vw;font-family:'Azeret Mono',monospace;background:#080c14}
  .mark{position:absolute;top:5%;left:7vw;display:flex;align-items:center;gap:12px;z-index:10}
  .wordmark{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.32em;font-size:18px}
  .kick{letter-spacing:.28em;text-transform:uppercase;font-size:clamp(10px,1.1vw,13px)}
  .title{font-family:'Instrument Serif',serif;font-weight:500;line-height:.98;letter-spacing:-.01em;font-size:clamp(40px,7vw,92px);margin-top:1.2vh}
  .sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(16px,2vw,24px);margin-top:1.4vh}
  
  /* Cosmic animations */
  @keyframes galaxy-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  @keyframes nebula-drift {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    50% { transform: translate(20px, -10px) scale(1.1); opacity: 0.5; }
  }
  
  @keyframes shooting-star {
    0% { transform: translateX(0) translateY(0); opacity: 1; }
    100% { transform: translateX(-200px) translateY(200px); opacity: 0; }
  }
  
  @keyframes cosmic-dust {
    0%, 100% { transform: translate(0, 0); opacity: 0.1; }
    50% { transform: translate(10px, -5px); opacity: 0.3; }
  }
  
  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(201,168,106,0.5)); }
    50% { filter: drop-shadow(0 0 16px rgba(201,168,106,0.8)); }
  }
  
  .galaxy{position:absolute;width:600px;height:600px;border-radius:50%;animation:galaxy-rotate var(--rotation-duration, 60s) linear infinite}
  .galaxy-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,106,0.3) 0%,rgba(110,90,166,0.2) 40%,transparent 70%);border-radius:50%}
  .galaxy-arm{position:absolute;top:50%;left:50%;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(156,148,198,0.4),transparent);transform-origin:0 50%}
  
  .nebula{position:absolute;border-radius:50%;filter:blur(60px);animation:nebula-drift var(--drift-duration, 20s) ease-in-out infinite}
  
  .shooting-star{position:absolute;width:100px;height:2px;background:linear-gradient(90deg,rgba(255,255,255,0.8),transparent);animation:shooting-star var(--shoot-duration, 3s) ease-out infinite;animation-delay:var(--shoot-delay, 0s)}
  
  .cosmic-dust{position:absolute;width:1px;height:1px;background:rgba(201,168,106,0.6);border-radius:50%;animation:cosmic-dust var(--dust-duration, 10s) ease-in-out infinite}
  
  .star{position:absolute;background:#fff;border-radius:50%}
  .gstar{position:absolute;animation:pulse-glow 3s ease-in-out infinite}
  .gstar svg{filter:drop-shadow(0 0 8px rgba(201,168,106,.8))}
  
  svg.constel{position:absolute;right:5vw;top:12%;width:min(42vw,520px);height:auto;opacity:.5;transition:transform 0.3s ease-out}
  .burst{filter:drop-shadow(0 0 10px rgba(201,168,106,.7))}
  
  .parallax-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .parallax-layer.galaxy{z-index:0}
  .parallax-layer.nebulae{z-index:1}
  .parallax-layer.stars{z-index:2}
  .parallax-layer.constellation{z-index:3}
</style>
</head>
<body>
<div class="hero" id="hero">
  <div class="parallax-layer galaxy" id="galaxy-layer"></div>
  <div class="parallax-layer nebulae" id="nebula-layer"></div>
  <div class="parallax-layer stars" id="stars-layer"></div>
  <div class="parallax-layer constellation" id="constel-layer"></div>
  <div class="mark" id="mark"></div>
  <div class="kick" id="kick"></div>
  <div class="title" id="title"></div>
  <div class="sub" id="sub"></div>
</div>
<script>
/* ============ COSMIC CONFIGURATION ============ */
var CONFIG = {
  kicker: "3D Environment & Technical Art",
  title: "Cosmic Void",
  sub: "beyond the edge of known space",
  
  // Galaxy settings
  galaxyRotationSpeed: 60,      // Rotation duration in seconds
  galaxyArmCount: 4,           // Number of spiral arms
  galaxySize: 600,             // Galaxy size in pixels
  
  // Nebula settings
  nebulaCount: 3,
  nebulaColors: ["rgba(110,90,166,0.4)", "rgba(60,92,158,0.3)", "rgba(156,148,198,0.3)"],
  
  // Shooting star settings
  shootingStarCount: 2,
  shootingStarInterval: 4000,  // Milliseconds between shooting stars
  
  // Cosmic dust
  dustCount: 40,
  
  // Regular stars
  starCount: 80,
  gstarCount: 8,
  
  // Parallax
  parallaxEnabled: true,
  parallaxStrength: 0.05
};
/* ============================================= */

// URL overrides
var q=new URLSearchParams(location.search);
["kicker","title","sub"].forEach(function(k){ if(q.get(k)) CONFIG[k]=q.get(k); });
Object.keys(CONFIG).forEach(function(k){ 
  if(typeof CONFIG[k] === 'number' && q.get(k)) CONFIG[k]=parseFloat(q.get(k)); 
});
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function burst(size,color){
  var pts=[],cx=size/2,cy=size/2,o=size/2,inr=o*0.4;
  for(var i=0;i<16;i++){
    var r=i%2===0?o:inr;
    var a=-Math.PI/2+i*Math.PI/8;
    pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));
  }
  return '<svg class="burst" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/></svg>';
}

function fourstar(s,c){
  var h=s/2,t=s*0.16;
  var d="M "+h+" 0 L "+(h+t)+" "+(h-t)+" L "+s+" "+h+" L "+(h+t)+" "+(h+t)+" L "+h+" "+s+" L "+(h-t)+" "+(h+t)+" L 0 "+h+" L "+(h-t)+" "+(h-t)+" Z";
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'"><path d="'+d+'" fill="'+c+'"/></svg>';
}

function rng(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}

function randomRange(min, max) {
  return Math.random() * (max - min) + min;
}

function createGalaxy() {
  var html='<div class="galaxy" style="width:'+CONFIG.galaxySize+'px;height:'+CONFIG.galaxySize+'px;--rotation-duration:'+CONFIG.galaxyRotationSpeed+'s">';
  html+='<div class="galaxy-core"></div>';
  
  for(var i=0;i<CONFIG.galaxyArmCount;i++){
    var angle=(i/CONFIG.galaxyArmCount)*360;
    html+='<div class="galaxy-arm" style="transform:rotate('+angle+'deg)"></div>';
  }
  html+='</div>';
  return html;
}

function createNebulae() {
  var r=rng(789);
  var html='';
  for(var i=0;i<CONFIG.nebulaCount;i++){
    var x=(r()*80+10).toFixed(1);
    var y=(r()*80+10).toFixed(1);
    var size=(r()*40+30).toFixed(1);
    var color=CONFIG.nebulaColors[i%CONFIG.nebulaColors.length];
    var duration=randomRange(15,25).toFixed(1);
    html+='<div class="nebula" style="left:'+x+'%;top:'+y+'%;width:'+size+'%;height:'+size+'%;background:'+color+';--drift-duration:'+duration+'s"></div>';
  }
  return html;
}

function createShootingStars(container) {
  var r=rng(456);
  var html='';
  for(var i=0;i<CONFIG.shootingStarCount;i++){
    var x=(r()*60+20).toFixed(1);
    var y=(r()*40+10).toFixed(1);
    var duration=randomRange(2,4).toFixed(1);
    var delay=(i*CONFIG.shootingStarInterval/1000).toFixed(1);
    html+='<div class="shooting-star" style="left:'+x+'%;top:'+y+'%;--shoot-duration:'+duration+'s;--shoot-delay:'+delay+'s"></div>';
  }
  container.innerHTML=html;
}

function createCosmicDust(container, count) {
  var r=rng(321);
  var html='';
  for(var i=0;i<count;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    var duration=randomRange(8,15).toFixed(1);
    var delay=(r()*5).toFixed(1);
    html+='<div class="cosmic-dust" style="left:'+x+'%;top:'+y+'%;--dust-duration:'+duration+'s;animation-delay:'+delay+'s"></div>';
  }
  container.innerHTML=html;
}

function createStars(container, count, isGold) {
  var r=rng(42);
  var html='';
  var gold="#C9A86A";
  
  for(var i=0;i<count;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    var parallaxDepth=(r()*2-1).toFixed(2);
    
    if(isGold){
      html+='<div class="gstar parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.6">'+fourstar(12,gold)+'</div>';
    } else {
      var sz=(0.6+r()*1.4).toFixed(1);
      var opacity=(0.15+r()*0.4).toFixed(2);
      html+='<div class="star parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+opacity+'"></div>';
    }
  }
  container.innerHTML=html;
}

function setupParallax() {
  if(!CONFIG.parallaxEnabled) return;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  
  var hero=document.getElementById('hero');
  var stars=document.querySelectorAll('.parallax-star');
  var galaxy=document.querySelector('.galaxy');
  var constel=document.querySelector('.constel');
  
  hero.addEventListener('mousemove', function(e){
    var rect=hero.getBoundingClientRect();
    var mouseX=(e.clientX-rect.left)/rect.width-0.5;
    var mouseY=(e.clientY-rect.top)/rect.height-0.5;
    
    stars.forEach(function(star){
      var depth=parseFloat(star.getAttribute('data-depth')||0);
      var moveX=mouseX*depth*CONFIG.parallaxStrength*120;
      var moveY=mouseY*depth*CONFIG.parallaxStrength*120;
      star.style.transform='translate('+moveX+'px,'+moveY+'px)';
    });
    
    if(galaxy){
      var moveX=mouseX*CONFIG.parallaxStrength*40;
      var moveY=mouseY*CONFIG.parallaxStrength*40;
      galaxy.style.transform='translate('+moveX+'px,'+moveY+'px)';
    }
    
    if(constel){
      var moveX=mouseX*CONFIG.parallaxStrength*70;
      var moveY=mouseY*CONFIG.parallaxStrength*70;
      constel.style.transform='translate('+moveX+'px,'+moveY+'px)';
    }
  });
  
  hero.addEventListener('mouseleave', function(){
    stars.forEach(function(star){
      star.style.transform='translate(0,0)';
    });
    if(galaxy){
      galaxy.style.transform='translate(0,0)';
    }
    if(constel){
      constel.style.transform='translate(0,0)';
    }
  });
}

function render(){
  var h=document.getElementById("hero");
  var gold="#C9A86A";
  
  // Position galaxy
  var galaxyHtml=createGalaxy();
  document.getElementById('galaxy-layer').innerHTML='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">'+galaxyHtml+'</div>';
  
  // Render nebulae
  document.getElementById('nebula-layer').innerHTML=createNebulae();
  
  // Render shooting stars
  createShootingStars(document.getElementById('nebula-layer'));
  
  // Render cosmic dust
  createCosmicDust(document.getElementById('stars-layer'), CONFIG.dustCount);
  
  // Render stars
  createStars(document.getElementById('stars-layer'), CONFIG.starCount, false);
  var r2=rng(11);
  for(var j=0;j<CONFIG.gstarCount;j++){
    var x=(55+r2()*40).toFixed(1);
    var y=(10+r2()*70).toFixed(1);
    var parallaxDepth=(r2()*2-1).toFixed(2);
    document.getElementById('stars-layer').innerHTML+='<div class="gstar parallax-star" data-depth="'+parallaxDepth+'" style="left:'+x+'%;top:'+y+'%;opacity:.6">'+fourstar(12,gold)+'</div>';
  }
  
  // Render constellation
  document.getElementById('constel-layer').innerHTML='<svg class="constel" viewBox="0 0 520 330"><g stroke="#9F94C6" stroke-width="1" fill="none" opacity=".5"><path d="M30 90 L160 200 L300 110 L450 240 M300 110 L350 40 L230 300"/></g><g fill="#C9A86A"><circle cx="30" cy="90" r="4"/><circle cx="160" cy="200" r="5"/><circle cx="300" cy="110" r="4"/><circle cx="450" cy="240" r="5"/><circle cx="350" cy="40" r="4"/><circle cx="230" cy="300" r="4"/></g></svg>';
  
  // Render text
  document.getElementById('mark').innerHTML=burst(26,gold)+'<span class="wordmark" style="color:#ECEAF4">MELODIA</span>';
  document.getElementById('kick').innerHTML=esc(CONFIG.kicker);
  document.getElementById('kick').style.color="#C2BAE0";
  document.getElementById('title').innerHTML=esc(CONFIG.title);
  document.getElementById('title').style.color="#ECEAF4";
  document.getElementById('sub').innerHTML=esc(CONFIG.sub);
  document.getElementById('sub').style.color="#9F94C6";
  
  setupParallax();
}

render();
</script>
</body>
</html>
