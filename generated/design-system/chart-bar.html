<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  CHART/BAR — Simple bar chart for performance metrics
  HOW TO USE: Wix Editor → Add (+) → Embed Code → Embed HTML → paste this file.
  Size: ~ 400 × 120px
  Edit DATA below to customize.
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{display:flex;justify-content:center;padding:8px}
  .chart{width:100%;max-width:400px;padding:16px;background:#FFFFFF;border:1px solid #E3DACE;border-radius:2px;font-family:'IBM Plex Mono',monospace}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6E6080}
  .value{font-size:14px;font-weight:500;color:#241B2E}
  .bar-container{width:100%;height:24px;background:#F7F4EF;border-radius:2px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,#C9A86A,#A7884E);transition:width 0.3s}
  .unit{font-size:10px;color:#5A6170;margin-top:4px}
</style>
</head>
<body>
<div id="chart"></div>
<script>
var DATA = {
  label: "Triangle Count",
  value: 482318,
  max: 1000000,
  unit: "triangles"
};
var q=new URLSearchParams(location.search);
["label","unit"].forEach(function(k){ if(q.get(k)) DATA[k]=q.get(k); });
["value","max"].forEach(function(k){ if(q.get(k)) DATA[k]=Number(q.get(k)); });
function esc(v){return String(v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

function render(){
  var h=document.getElementById("chart");
  var value=Number.isFinite(DATA.value)?DATA.value:0;
  var max=Number.isFinite(DATA.max)&&DATA.max>0?DATA.max:1;
  var pct=Math.min(100,(value/max)*100).toFixed(1);
  var formatted=value.toLocaleString();
  h.innerHTML='<div class="chart"><div class="head"><span class="label">'+esc(DATA.label)+'</span><span class="value">'+formatted+'</span></div><div class="bar-container"><div class="bar" style="width:'+pct+'%"></div></div><div class="unit">'+esc(DATA.unit)+'</div></div>';
}
render();
</script>
</body>
</html>
