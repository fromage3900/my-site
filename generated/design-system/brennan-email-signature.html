<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  BRENNAN SHEPHERD · Email Signature
  HOW TO USE:
   1. Copy the HTML below the script
   2. Paste into your email client's signature editor (HTML mode)
   3. Update the DATA block with your info
   4. Images are embedded as base64 for portability
-->
<style>
  .sig{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;line-height:1.5;color:#241B2E}
  .sig a{color:#C9A86A;text-decoration:none}
  .sig a:hover{text-decoration:underline}
  .name{font-weight:600;font-size:15px;color:#241B2E}
  .title{color:#6E6080;font-size:12px;margin-bottom:8px}
  .divider{height:1px;background:linear-gradient(to right,transparent,#C9A86A,transparent);margin:12px 0}
  .contact{font-size:11px;color:#5A6170}
  .contact span{margin-right:12px}
  .location{font-size:11px;color:#5A6170;margin-top:4px}
  .badge{display:inline-block;padding:2px 8px;background:#F7F4EF;border:1px solid #E3DACE;border-radius:2px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#6E6080;margin-top:8px}
</style>
</head>
<body>
<div class="sig">
  <div class="name">Brennan Shepherd</div>
  <div class="title">3D Environment & Technical Artist</div>
  <div class="divider"></div>
  <div class="contact">
    <span>📧 brennan@example.com</span>
    <span>📍 Toronto, ON</span>
  </div>
  <div class="location">Available for freelance & full-time</div>
  <div class="badge">✦ Portfolio: fromageart.xyz</div>
</div>
</body>
</html>
