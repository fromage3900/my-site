<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  BRENNAN SHEPHERD · LinkedIn Banner (1584 x 396px)
  HOW TO USE:
   1. Open this file in a browser
   2. Take a screenshot at 1584 x 396px
   3. Upload to LinkedIn as your cover photo
   4. Edit DATA below to customize
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@500&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a1a}
  .banner{width:1584px;height:396px;position:relative;overflow:hidden;background:linear-gradient(135deg,#F7F4EF 0%,#EFEAE1 50%,#F7F4EF 100%);font-family:'IBM Plex Mono',monospace}
  .mark{position:absolute;top:32px;left:48px;display:flex;align-items:center;gap:16px}
  .wordmark{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.32em;font-size:22px;color:#241B2E}
  .kick{letter-spacing:.28em;text-transform:uppercase;font-size:14px;color:#6E6080}
  .title{font-family:'Fraunces',serif;font-weight:500;line-height:.95;letter-spacing:-.01em;font-size:72px;color:#241B2E;position:absolute;top:50%;left:48px;transform:translateY(-50%);max-width:800px}
  .sub{font-family:'Fraunces',serif;font-style:italic;font-size:24px;color:#A7884E;position:absolute;bottom:48px;left:48px}
  .accent{position:absolute;right:48px;bottom:48px;width:2px;height:180px;background:linear-gradient(to bottom,transparent,rgba(176,141,79,.5),transparent)}
  .star{position:absolute;background:#A7884E;border-radius:50%;opacity:.4}
  .gstar{position:absolute}
  .burst{filter:drop-shadow(0 0 8px rgba(176,141,79,.5))}
  .availability{position:absolute;top:32px;right:48px;padding:8px 20px;background:rgba(176,141,79,.15);border:1px solid rgba(176,141,79,.4);border-radius:2px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A7884E}
</style>
</head>
<body>
<div class="banner" id="banner"></div>
<script>
var DATA = {
  kicker: "3D Environment & Technical Art",
  title: "Brennan Shepherd",
  sub: "Toronto, ON · Available for Work",
  availability: "Open to Opportunities"
};

function burst(size,color){
  var pts=[],cx=size/2,cy=size/2,o=size/2,inr=o*0.4;
  for(var i=0;i<16;i++){var r=i%2===0?o:inr;var a=-Math.PI/2+i*Math.PI/8;pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));}
  return '<svg class="burst" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/></svg>';
}
function fourstar(s,c){
  var h=s/2,t=s*0.16;
  var d="M "+h+" 0 L "+(h+t)+" "+(h-t)+" L "+s+" "+h+" L "+(h+t)+" "+(h+t)+" L "+h+" "+s+" L "+(h-t)+" "+(h+t)+" L 0 "+h+" L "+(h-t)+" "+(h-t)+" Z";
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'"><path d="'+d+'" fill="'+c+'"/></svg>';
}
function rng(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}

function render(){
  var h=document.getElementById("banner");
  var gold="#A7884E";
  var html='';
  var r=rng(13);
  for(var i=0;i<12;i++){
    var x=(r()*100).toFixed(2);
    var y=(r()*100).toFixed(2);
    if(i%4===0){
      html+='<div class="gstar" style="left:'+x+'%;top:'+y+'%;opacity:.3">'+fourstar(8,gold)+'</div>';
    }else{
      var sz=(0.6+r()*1.2).toFixed(1);
      html+='<div class="star" style="left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px"></div>';
    }
  }
  html+='<div class="availability">'+DATA.availability+'</div>';
  html+='<div class="mark">'+burst(24,gold)+'<span class="wordmark">BRENNAN SHEPHERD</span></div>';
  html+='<div class="kick">'+DATA.kicker+'</div>';
  html+='<div class="title">'+DATA.title+'</div>';
  html+='<div class="sub">'+DATA.sub+'</div>';
  html+='<div class="accent"></div>';
  h.innerHTML=html;
}
render();
</script>
</body>
</html>
