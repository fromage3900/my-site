<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>L_SakuraPath - Asset Passport</title>
<link rel="stylesheet" href="../components/melodia-animations.css">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: transparent; color: #f4f0ea; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
.passport { width: min(100vw, 420px); min-height: 560px; padding: 28px; background: linear-gradient(160deg, rgba(12,15,20,.98), rgba(31,38,48,.96)); border: 1px solid rgba(244,240,234,.16); box-shadow: 0 24px 70px rgba(0,0,0,.32); }
.eyebrow { margin: 0 0 14px; color: #d8b27a; text-transform: uppercase; letter-spacing: .14em; font-size: 12px; }
h1 { margin: 0; font-size: 31px; line-height: 1.05; letter-spacing: 0; }
.category { margin: 10px 0 28px; color: rgba(244,240,234,.68); }
.row { display: flex; justify-content: space-between; gap: 18px; padding: 13px 0; border-top: 1px solid rgba(244,240,234,.12); font-size: 14px; }
.row span { color: rgba(244,240,234,.64); }
.row strong { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace; font-size: 13px; text-align: right; }
.footer { margin-top: 26px; font-size: 12px; color: rgba(244,240,234,.46); }
</style>
</head>
<body>
<section class="passport">
  <p class="eyebrow">Asset Passport</p>
  <h1>L_SakuraPath</h1>
  <p class="category">Environment</p>
  <div class="row"><span>Triangles</span><strong>51,347</strong></div>
<div class="row"><span>Textures</span><strong>8K</strong></div>
<div class="row"><span>Materials</span><strong>209</strong></div>
<div class="row"><span>Engine</span><strong>Unreal Engine 5.8</strong></div>
<div class="row"><span>Date</span><strong>2026-06</strong></div>
  <p class="footer">Generated from the Unreal portfolio pipeline.</p>
</section>
</body>
</html>
