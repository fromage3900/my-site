<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Melodia Smooth Scroll Navigation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .scroll-container {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .scroll-container::-webkit-scrollbar {
    width: 8px;
  }

  .scroll-container::-webkit-scrollbar-track {
    background: rgba(201, 168, 106, 0.1);
  }

  .scroll-container::-webkit-scrollbar-thumb {
    background: rgba(201, 168, 106, 0.4);
    border-radius: 4px;
  }

  .scroll-container::-webkit-scrollbar-thumb:hover {
    background: rgba(201, 168, 106, 0.6);
  }

  /* Sections */
  .section {
    min-height: 100vh;
    padding: 60px 40px;
    scroll-margin-top: 60px;
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    .scroll-container {
      scroll-behavior: auto;
    }
  }
</style>
</head>
<body>
<div class="scroll-container" id="scrollContainer">
  <!-- Sections will be dynamically added here -->
</div>

<script>
  // Configuration from URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const config = {
    sections: JSON.parse(urlParams.get('sections') || '[]'),
    autoScroll: urlParams.get('autoScroll') === 'true'
  };

  const scrollContainer = document.getElementById('scrollContainer');

  // Create sections
  if (config.sections.length > 0) {
    config.sections.forEach(section => {
      const sectionEl = document.createElement('div');
      sectionEl.className = 'section';
      sectionEl.id = section.id;
      sectionEl.innerHTML = section.content || '';
      scrollContainer.appendChild(sectionEl);
    });
  }

  // Smooth scroll to section
  function scrollToSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (section) {
      section.scrollIntoView({ behavior: 'smooth' });
    }
  }

  // Listen for navigation messages
  window.addEventListener('message', (event) => {
    if (event.data.type === 'navigate') {
      scrollToSection(event.data.section);
    }
  });

  // Auto-scroll if enabled
  if (config.autoScroll && config.sections.length > 0) {
    let currentSectionIndex = 0;
    
    setInterval(() => {
      currentSectionIndex = (currentSectionIndex + 1) % config.sections.length;
      scrollToSection(config.sections[currentSectionIndex].id);
    }, 8000);
  }

  // Expose scroll function globally
  window.melodiaScrollTo = scrollToSection;
</script>
</body>
</html>
