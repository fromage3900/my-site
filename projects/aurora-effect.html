<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  MELODIA — Aurora Effect Example
  Standalone aurora borealis effect
-->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument Serif:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/melodia-animations.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  .container{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0e1a}
  .content{position:relative;z-index:10;text-align:center;color:#ECEAF4;font-family:'Instrument Serif',serif}
  .aurora-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  h1{font-size:48px;margin-bottom:16px;text-shadow:0 0 20px rgba(201,168,106,0.5)}
  p{font-family:'Azeret Mono',monospace;font-size:14px;opacity:0.8}
</style>
</head>
<body>
<div class="container">
  <div class="aurora-container" id="aurora"></div>
  <div class="content">
    <h1>Aurora Borealis</h1>
    <p>Flowing northern lights effect</p>
  </div>
</div>

<!-- Load utilities and components -->
<script src="../components/melodia-utils.js"></script>
<script src="../components/melodia-aurora.js"></script>

<script>
// Initialize aurora effect
const aurora = new MelodiaAurora('#aurora', {
  auroraCount: 3,
  auroraIntensity: 0.7,
  auroraSpeed: 1.2,
  particleCount: 60,
  auroraColors: [
    'rgba(110,90,166,0.5)',
    'rgba(60,92,158,0.4)',
    'rgba(156,148,198,0.4)'
  ]
});

aurora.init();

// Optional: Add interactivity
document.querySelector('.container').addEventListener('click', () => {
  aurora.setAuroraIntensity(Math.random());
});
</script>
</body>
</html>
